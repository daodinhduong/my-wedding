services:
  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://nuxt:nuxt@db:5432/nuxt_app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nuxt_app
      POSTGRES_USER: nuxt
      POSTGRES_PASSWORD: nuxt
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuxt -d nuxt_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
