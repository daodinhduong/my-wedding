services:
  app:
    build:
      context: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgres://nuxt:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/nuxt_app
      NUXT_DATABASE_URL: postgres://nuxt:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/nuxt_app
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      NUXT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: nuxt_app
      POSTGRES_USER: nuxt
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuxt -d nuxt_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
